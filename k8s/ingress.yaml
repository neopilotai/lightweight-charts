apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trading-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-enabled: "true"
    nginx.ingress.kubernetes.io/proxy-buffering: "on"
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: trading-backend
                port:
                  number: 3000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: trading-backend
                port:
                  number: 3000
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: trading-backend
                port:
                  number: 3000
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: trading-backend
                port:
                  number: 3000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: trading-backend
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: trading-frontend
                port:
                  number: 80