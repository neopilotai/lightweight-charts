global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "/etc/prometheus/rules/*.yaml"

scrape_configs:
  - job_name: 'trading-backend'
    static_configs:
      - targets: ['backend:3000']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']